[env]
PYTHONPATH = "{{config_root}}"
UV_CACHE_DIR = "{{config_root}}/.cache/uv"
XDG_CACHE_HOME = "{{config_root}}/.cache"

[tools]
uv = "latest"

[tasks.sync]
description = "開発に向け、依存関係をインストールする。"
run = "uv sync --dev"

[tasks.start]
description = "Bot を起動する。"
depends = ["sync"]
run = """
if [ ! -f config.yaml ]; then
  echo "config.yaml がありません。 config.example.yaml をコピーして設定してください。"
  exit 1
fi
uv run launch_app.py
"""

[tasks.test]
description = "テストを実行する。"
depends = ["sync"]
run = "uv run pytest"

[tasks.format]
description = "コードをフォーマットする。"
depends = ["sync"]
run = "uv run ruff format ."

[tasks.lint]
description = "Ruff のチェックを実行し、可能な修正を行う。"
depends = ["sync"]
run = "uv run ruff check . --fix"

[tasks.typecheck]
description = "Pyright の型チェックを実行する。"
depends = ["sync"]
run = "uv run pyright"

[tasks."db:revision"]
description = "Alembic の自動生成でマイグレーションを作成する。例: mise run db:revision add_role_table"
depends = ["sync"]
run = "uv run alembic revision --autogenerate -m"

[tasks."db:upgrade"]
description = "Alembic マイグレーションを最新 revision まで適用する。"
depends = ["sync"]
run = "uv run alembic upgrade head"

[tasks."db:stamp"]
description = "既存 DB の現在スキーマを Alembic 最新 revision 適用済みとして記録する。"
depends = ["sync"]
run = "uv run alembic stamp head"

[tasks."db:test-migrations"]
description = "Alembic revision チェックのテストを実行する。"
depends = ["sync"]
run = "uv run pytest tests/test_database_migrations_check.py"

[tasks.check]
description = "Lint・型チェック・テストをまとめて実行する。"
depends = ["lint", "typecheck", "test"]
